<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoteVault — Advanced Notes Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="light-theme">

  <!-- TOP BAR -->
  <header class="topbar" role="banner">
    <div class="topbar__brand">
      <div class="topbar__logo" aria-hidden="true">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="8" fill="#6366F1"/>
          <rect x="6" y="7" width="16" height="2.5" rx="1.25" fill="white"/>
          <rect x="6" y="12.75" width="12" height="2.5" rx="1.25" fill="white" opacity="0.7"/>
          <rect x="6" y="18.5" width="9" height="2.5" rx="1.25" fill="white" opacity="0.4"/>
        </svg>
      </div>
      <span class="topbar__title">NoteVault</span>
    </div>

    <div class="topbar__search">
      <label for="searchInput" class="sr-only">Search notes</label>
      <svg class="topbar__search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M11 11l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input type="text" id="searchInput" class="topbar__search-input" placeholder="Search notes… (Ctrl+F)" aria-label="Search notes" autocomplete="off" />
      <button class="topbar__search-clear" id="searchClear" aria-label="Clear search" hidden>✕</button>
    </div>

    <div class="topbar__actions">
      <button class="btn btn--ghost btn--sm" id="importBtn" aria-label="Import notes">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M7 1v8M4 6l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M1 10v1a2 2 0 002 2h8a2 2 0 002-2v-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Import
      </button>
      <button class="btn btn--ghost btn--sm" id="exportBtn" aria-label="Export notes">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M7 9V1M4 4l3-3 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M1 10v1a2 2 0 002 2h8a2 2 0 002-2v-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Export
      </button>
      <button class="btn btn--primary" id="createNoteBtn" aria-label="Create new note (Ctrl+N)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        Create Note
      </button>
      <button class="btn btn--icon" id="themeToggleBtn" aria-label="Toggle dark/light theme">
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><circle cx="9" cy="9" r="3.5" stroke="currentColor" stroke-width="1.5"/><path d="M9 1v2M9 15v2M1 9h2M15 9h2M3.22 3.22l1.41 1.41M13.36 13.36l1.41 1.41M3.22 14.78l1.41-1.41M13.36 4.64l1.41-1.41" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M15 10.5A7 7 0 017.5 3a7 7 0 100 12A7 7 0 0115 10.5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>

    <input type="file" id="importFileInput" accept=".json" style="display:none" aria-hidden="true" />
  </header>

  <!-- STATS BAR -->
  <div class="stats-bar" role="region" aria-label="Notes statistics">
    <div class="stat-item">
      <span class="stat-value" id="statTotal">0</span>
      <span class="stat-label">Total</span>
    </div>
    <div class="stat-divider" aria-hidden="true"></div>
    <div class="stat-item">
      <span class="stat-value stat-value--active" id="statActive">0</span>
      <span class="stat-label">Active</span>
    </div>
    <div class="stat-divider" aria-hidden="true"></div>
    <div class="stat-item">
      <span class="stat-value stat-value--done" id="statCompleted">0</span>
      <span class="stat-label">Completed</span>
    </div>
    <div class="stat-divider" aria-hidden="true"></div>
    <div class="stat-item">
      <span class="stat-value stat-value--archive" id="statArchived">0</span>
      <span class="stat-label">Archived</span>
    </div>
    <div class="stat-divider" aria-hidden="true"></div>
    <div class="stat-item">
      <span class="stat-value stat-value--fav" id="statFavorites">0</span>
      <span class="stat-label">Favorites</span>
    </div>
  </div>

  <!-- MOBILE FILTER PANEL (visible on tablet/mobile) -->
  <div class="mobile-panel" id="mobilePanel" hidden>
    <div class="mobile-panel__row">
      <select id="mobileSortSelect" class="mobile-panel__select" aria-label="Sort notes">
        <option value="createdDesc">Date Created ↓</option>
        <option value="createdAsc">Date Created ↑</option>
        <option value="updatedDesc">Date Updated ↓</option>
        <option value="updatedAsc">Date Updated ↑</option>
        <option value="titleAZ">Title A → Z</option>
        <option value="titleZA">Title Z → A</option>
        <option value="priority">Priority</option>
      </select>
      <select id="mobileFilterCategory" class="mobile-panel__select" aria-label="Filter by category">
        <option value="">All Categories</option>
        <option value="Work">Work</option>
        <option value="Study">Study</option>
        <option value="Personal">Personal</option>
        <option value="Finance">Finance</option>
        <option value="Other">Other</option>
      </select>
      <select id="mobileFilterPriority" class="mobile-panel__select" aria-label="Filter by priority">
        <option value="">All Priorities</option>
        <option value="Low">Low</option>
        <option value="Medium">Medium</option>
        <option value="High">High</option>
        <option value="Critical">Critical</option>
      </select>
      <select id="mobileFilterStatus" class="mobile-panel__select" aria-label="Filter by status">
        <option value="">All Statuses</option>
        <option value="Active">Active</option>
        <option value="In Progress">In Progress</option>
        <option value="Completed">Completed</option>
        <option value="Archived">Archived</option>
      </select>
    </div>
    <div class="mobile-panel__row mobile-panel__row--actions">
      <button class="btn btn--ghost btn--sm" id="mobileImportBtn" aria-label="Import notes">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M7 1v8M4 6l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M1 10v1a2 2 0 002 2h8a2 2 0 002-2v-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Import
      </button>
      <button class="btn btn--ghost btn--sm" id="mobileExportBtn" aria-label="Export notes">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M7 9V1M4 4l3-3 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M1 10v1a2 2 0 002 2h8a2 2 0 002-2v-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Export
      </button>
      <div class="mobile-panel__views">
        <button class="mobile-view-btn active" data-view="main" aria-label="All Notes">All</button>
        <button class="mobile-view-btn" data-view="favorites" aria-label="Favorites">★ Fav</button>
        <button class="mobile-view-btn" data-view="archived" aria-label="Archived">Archive</button>
      </div>
    </div>
  </div>

  <!-- MAIN LAYOUT -->
  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar" role="complementary" aria-label="Filters and sorting">
      <div class="sidebar__section">
        <h3 class="sidebar__heading">View</h3>
        <button class="sidebar__nav-item active" data-view="main" id="viewMain">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><rect x="1" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="8" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="1" y="8" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="8" y="8" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/></svg>
          All Notes
        </button>
        <button class="sidebar__nav-item" data-view="favorites" id="viewFavorites">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M7 1l1.545 3.13L12 4.635l-2.5 2.435.59 3.44L7 8.875l-3.09 1.635.59-3.44L2 4.635l3.455-.505L7 1z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
          Favorites
        </button>
        <button class="sidebar__nav-item" data-view="archived" id="viewArchived">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><rect x="1" y="3.5" width="12" height="9" rx="1" stroke="currentColor" stroke-width="1.4"/><path d="M1 3.5l1.5-2h9L13 3.5" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M5 7h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          Archived Notes
        </button>
      </div>

      <div class="sidebar__section">
        <h3 class="sidebar__heading">Sort By</h3>
        <label for="sortSelect" class="sr-only">Sort notes by</label>
        <select id="sortSelect" class="sidebar__select" aria-label="Sort notes">
          <option value="createdDesc">Date Created ↓</option>
          <option value="createdAsc">Date Created ↑</option>
          <option value="updatedDesc">Date Updated ↓</option>
          <option value="updatedAsc">Date Updated ↑</option>
          <option value="titleAZ">Title A → Z</option>
          <option value="titleZA">Title Z → A</option>
          <option value="priority">Priority</option>
        </select>
      </div>

      <div class="sidebar__section">
        <h3 class="sidebar__heading">Filter</h3>

        <label class="sidebar__filter-label" for="filterCategory">Category</label>
        <select id="filterCategory" class="sidebar__select" aria-label="Filter by category">
          <option value="">All Categories</option>
          <option value="Work">Work</option>
          <option value="Study">Study</option>
          <option value="Personal">Personal</option>
          <option value="Finance">Finance</option>
          <option value="Other">Other</option>
        </select>

        <label class="sidebar__filter-label" for="filterPriority">Priority</label>
        <select id="filterPriority" class="sidebar__select" aria-label="Filter by priority">
          <option value="">All Priorities</option>
          <option value="Low">Low</option>
          <option value="Medium">Medium</option>
          <option value="High">High</option>
          <option value="Critical">Critical</option>
        </select>

        <label class="sidebar__filter-label" for="filterStatus">Status</label>
        <select id="filterStatus" class="sidebar__select" aria-label="Filter by status">
          <option value="">All Statuses</option>
          <option value="Active">Active</option>
          <option value="In Progress">In Progress</option>
          <option value="Completed">Completed</option>
          <option value="Archived">Archived</option>
        </select>

        <label class="sidebar__filter-label">Color</label>
        <div class="color-filter-grid" id="colorFilterGrid" role="group" aria-label="Filter by color"></div>

        <button class="btn btn--ghost btn--sm btn--full mt-8" id="clearFiltersBtn" aria-label="Clear all filters">Clear Filters</button>
      </div>

      <div class="sidebar__section" id="bulkActionsSection" hidden>
        <h3 class="sidebar__heading">Bulk Actions</h3>
        <span class="sidebar__selected-count" id="selectedCount">0 selected</span>
        <button class="btn btn--danger btn--sm btn--full" id="deleteSelectedBtn" aria-label="Delete selected notes">Delete Selected</button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main" role="main">
      <div class="main__toolbar">
        <h2 class="main__view-title" id="viewTitle">All Notes</h2>
        <div class="main__toolbar-right">
          <label class="checkbox-label" id="selectAllLabel" hidden>
            <input type="checkbox" id="selectAllCheckbox" aria-label="Select all notes" />
            <span>Select All</span>
          </label>
        </div>
      </div>

      <div class="notes-grid" id="notesGrid" role="list" aria-live="polite" aria-label="Notes list"></div>
      <div class="empty-state" id="emptyState" hidden>
        <div class="empty-state__icon" aria-hidden="true">
          <svg width="56" height="56" viewBox="0 0 56 56" fill="none"><rect x="8" y="10" width="40" height="36" rx="4" stroke="currentColor" stroke-width="2" stroke-dasharray="4 3"/><path d="M18 20h20M18 27h14M18 34h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </div>
        <p class="empty-state__title" id="emptyTitle">No notes yet</p>
        <p class="empty-state__sub" id="emptySub">Create your first note to get started</p>
      </div>
    </main>
  </div>

  <!-- NOTE MODAL (Create / Edit) -->
  <div class="modal-overlay" id="noteModalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
    <div class="modal" id="noteModal">
      <div class="modal__header">
        <h2 class="modal__title" id="modalTitle">Create Note</h2>
        <button class="btn btn--icon modal__close" id="modalCloseBtn" aria-label="Close modal">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M3 3l12 12M15 3L3 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>

      <div class="modal__body">
        <div class="draft-banner" id="draftBanner" hidden>
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M7 1a6 6 0 100 12A6 6 0 007 1z" stroke="currentColor" stroke-width="1.4"/><path d="M7 4v3.5l2 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          Draft restored from your last session.
          <button class="draft-banner__discard" id="discardDraftBtn" aria-label="Discard draft">Discard</button>
        </div>

        <div class="form-group">
          <label class="form-label" for="noteTitle">Title <span class="required" aria-hidden="true">*</span></label>
          <input type="text" id="noteTitle" class="form-input" placeholder="Note title…" maxlength="100" aria-required="true" aria-describedby="titleError" />
          <p class="form-error" id="titleError" role="alert" aria-live="polite"></p>
          <p class="form-hint"><span id="titleCharCount">0</span>/100</p>
        </div>

        <div class="form-group">
          <label class="form-label" for="noteDesc">Description <span class="required" aria-hidden="true">*</span></label>
          <textarea id="noteDesc" class="form-textarea" placeholder="Write your note…" maxlength="5000" rows="6" aria-required="true" aria-describedby="descError"></textarea>
          <p class="form-error" id="descError" role="alert" aria-live="polite"></p>
          <p class="form-hint"><span id="descCharCount">0</span>/5000</p>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="noteCategory">Category</label>
            <select id="noteCategory" class="form-select" aria-label="Note category">
              <option value="Work">Work</option>
              <option value="Study">Study</option>
              <option value="Personal">Personal</option>
              <option value="Finance">Finance</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="notePriority">Priority</label>
            <select id="notePriority" class="form-select" aria-label="Note priority">
              <option value="Low">Low</option>
              <option value="Medium">Medium</option>
              <option value="High">High</option>
              <option value="Critical">Critical</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="noteStatus">Status</label>
            <select id="noteStatus" class="form-select" aria-label="Note status">
              <option value="Active">Active</option>
              <option value="In Progress">In Progress</option>
              <option value="Completed">Completed</option>
              <option value="Archived">Archived</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Color</label>
          <div class="color-picker" id="colorPicker" role="group" aria-label="Choose note color"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="tagInput">Tags</label>
          <div class="tag-input-wrapper" id="tagInputWrapper">
            <div class="tag-list" id="tagList" aria-label="Added tags"></div>
            <input type="text" id="tagInput" class="tag-input" placeholder="Type tag and press Enter…" maxlength="20" aria-describedby="tagHint" />
          </div>
          <p class="form-hint" id="tagHint">Max 10 tags, 20 chars each. Press Enter to add.</p>
          <p class="form-error" id="tagError" role="alert" aria-live="polite"></p>
        </div>
      </div>

      <div class="modal__footer">
        <button class="btn btn--ghost" id="cancelModalBtn">Cancel</button>
        <button class="btn btn--primary" id="saveNoteBtn" aria-label="Save note (Ctrl+S)">Save Note</button>
      </div>
    </div>
  </div>

  <!-- NOTE DETAIL MODAL -->
  <div class="modal-overlay" id="detailModalOverlay" role="dialog" aria-modal="true" aria-labelledby="detailTitle" hidden>
    <div class="modal modal--detail" id="detailModal">
      <div class="modal__header">
        <div class="detail-header-left">
          <div class="detail-color-bar" id="detailColorBar" aria-hidden="true"></div>
          <h2 class="modal__title" id="detailTitle"></h2>
        </div>
        <div class="detail-header-actions">
          <button class="btn btn--ghost btn--sm" id="detailEditBtn" aria-label="Edit note">Edit</button>
          <button class="btn btn--icon modal__close" id="detailCloseBtn" aria-label="Close detail">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M3 3l12 12M15 3L3 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>
      <div class="modal__body" id="detailBody"></div>
    </div>
  </div>

  <!-- CONFIRM DIALOG -->
  <div class="modal-overlay" id="confirmOverlay" role="dialog" aria-modal="true" aria-labelledby="confirmMsg" hidden>
    <div class="modal modal--confirm">
      <div class="modal__body">
        <p class="confirm-msg" id="confirmMsg"></p>
      </div>
      <div class="modal__footer">
        <button class="btn btn--ghost" id="confirmNo">No</button>
        <button class="btn btn--danger" id="confirmYes">Yes</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast-container" id="toastContainer" aria-live="polite" aria-atomic="true"></div>

  <script src="app.js"></script>
</body>
</html>
